<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSockets — Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0b0c0f;
      --surface:   #13151a;
      --border:    #1e2128;
      --accent:    #f0c040;
      --on:        #3ddc84;
      --off:       #3a3d47;
      --text:      #e8e9ed;
      --muted:     #5a5d6b;
      --danger:    #e05a2b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Auth screen ── */
    #authScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .auth-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .auth-card h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .auth-card p { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; }
    .auth-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 1rem;
      outline: none; text-align: center; letter-spacing: 0.1em;
      margin-bottom: 16px; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; padding: 13px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #0b0c0f; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-error {
      color: var(--danger); font-size: 0.8rem;
      margin-top: 12px; display: none;
    }

    /* ── App (hidden until auth) ── */
    #app { display: none; }

    /* ── Header ── */
    header {
      padding: 24px 40px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 34px; height: 34px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
    }
    .logo-text { font-size: 1.15rem; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .admin-badge {
      background: rgba(240,192,64,0.12); border: 1px solid rgba(240,192,64,0.3);
      color: var(--accent); font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .broker-status {
      display: flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: var(--muted); background: var(--surface);
      padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border);
    }
    .broker-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .broker-status.connected .broker-dot { background: var(--on); box-shadow: 0 0 6px var(--on); }
    .broker-status.connected { color: var(--text); }
    .broker-status.error .broker-dot { background: var(--danger); }

    /* ── Settings bar ── */
    .settings-bar {
      padding: 14px 40px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }
    .settings-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); flex-shrink: 0;
    }
    .s-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      outline: none; transition: border-color 0.2s; min-width: 0;
    }
    .s-input:focus { border-color: var(--accent); }
    .s-input.wide { flex: 1; min-width: 160px; }
    .btn-connect {
      background: none; border: 1px solid var(--accent); border-radius: 8px;
      padding: 7px 16px; color: var(--accent); font-family: 'Syne', sans-serif;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-connect:hover { background: rgba(240,192,64,0.1); }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 36px 40px 80px; }
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .section-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .btn-add {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent); color: #0b0c0f; border: none;
      border-radius: 8px; padding: 10px 18px; font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,192,64,0.3); }

    /* ── Grid ── */
    .sockets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .socket-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; position: relative;
      overflow: hidden; transition: border-color 0.3s;
      animation: cardIn 0.3s ease both;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .socket-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: var(--off); transition: background 0.4s;
    }
    .socket-card.on::before { background: var(--on); }
    .socket-card.on { border-color: rgba(61,220,132,0.2); }

    .card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
    .card-name-wrap { flex:1; min-width:0; }

    .device-status { display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:0.67rem; margin-bottom:6px; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all 0.3s; flex-shrink:0; }
    .status-dot.online { background:var(--on); box-shadow:0 0 5px var(--on); }
    .status-dot.offline { background:var(--danger); }
    .status-label { color:var(--muted); }
    .status-label.online { color:var(--on); }
    .status-label.offline { color:var(--danger); }

    .card-name {
      font-size:1rem; font-weight:700; cursor:pointer;
      padding:2px 6px; margin:-2px -6px; border-radius:6px;
      transition:background 0.2s; display:flex; align-items:center; gap:6px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-name:hover { background:var(--border); }
    .card-name .edit-icon { opacity:0; font-size:0.72rem; transition:opacity 0.2s; flex-shrink:0; }
    .card-name:hover .edit-icon { opacity:1; }
    .card-name input {
      background:transparent; border:none; border-bottom:1px solid var(--accent);
      color:var(--text); font-family:'Syne',sans-serif; font-size:1rem;
      font-weight:700; outline:none; width:100%; padding:0;
    }
    .card-topic { font-family:'JetBrains Mono',monospace; font-size:0.66rem; color:var(--muted); margin-top:4px; }

    .btn-delete {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:0.95rem; padding:4px; border-radius:6px; flex-shrink:0; margin-left:8px;
      transition:color 0.2s, background 0.2s;
    }
    .btn-delete:hover { color:var(--danger); background:rgba(224,90,43,0.1); }

    .toggle-wrap { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
    .relay-state { font-size:1.9rem; font-weight:800; color:var(--muted); transition:color 0.3s; font-family:'JetBrains Mono',monospace; }
    .relay-state.on { color:var(--on); }
    .toggle-btn {
      width:62px; height:33px; border-radius:17px; border:none; cursor:pointer;
      position:relative; background:var(--off); transition:background 0.3s; flex-shrink:0;
    }
    .toggle-btn.on { background:var(--on); }
    .toggle-btn.disabled { opacity:0.4; cursor:not-allowed; }
    .toggle-btn::after {
      content:''; position:absolute; top:4px; left:4px;
      width:25px; height:25px; border-radius:50%; background:#fff;
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    .toggle-btn.on::after { transform:translateX(29px); }

    /* ── Empty state ── */
    .empty-state { grid-column:1/-1; text-align:center; padding:70px 20px; color:var(--muted); }
    .empty-icon { font-size:2.8rem; margin-bottom:14px; opacity:0.35; }
    .empty-title { font-size:1.05rem; font-weight:700; margin-bottom:6px; }
    .empty-sub { font-size:0.82rem; }

    /* ── Modal ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      backdrop-filter:blur(4px); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:30px; width:100%; max-width:400px;
      transform:translateY(16px); transition:transform 0.25s;
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal h2 { font-size:1.15rem; font-weight:800; margin-bottom:5px; }
    .modal p.sub { font-size:0.8rem; color:var(--muted); margin-bottom:22px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:0.72rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
    .form-group input {
      width:100%; background:var(--bg); border:1px solid var(--border);
      border-radius:9px; padding:11px 13px; color:var(--text);
      font-family:'JetBrains Mono',monospace; font-size:0.88rem;
      outline:none; transition:border-color 0.2s;
    }
    .form-group input:focus { border-color:var(--accent); }
    .form-group input::placeholder { color:var(--muted); }
    .form-hint { font-size:0.7rem; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }
    .modal-actions { display:flex; gap:10px; margin-top:22px; }
    .btn-cancel {
      flex:1; padding:11px; background:none; border:1px solid var(--border);
      border-radius:9px; color:var(--muted); font-family:'Syne',sans-serif;
      font-size:0.88rem; font-weight:600; cursor:pointer; transition:border-color 0.2s,color 0.2s;
    }
    .btn-cancel:hover { border-color:var(--muted); color:var(--text); }
    .btn-confirm {
      flex:2; padding:11px; background:var(--accent); border:none;
      border-radius:9px; color:#0b0c0f; font-family:'Syne',sans-serif;
      font-size:0.88rem; font-weight:700; cursor:pointer; transition:opacity 0.2s;
    }
    .btn-confirm:hover { opacity:0.85; }

    @media(max-width:600px){
      header,main,.settings-bar{padding-left:20px;padding-right:20px;}
    }
  </style>
</head>
<body>

<!-- ══ Auth Screen ══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <h1>Admin Panel</h1>
    <p>Введіть пароль для доступу до панелі керування</p>
    <input class="auth-input" type="password" id="authInput" placeholder="••••••••••"
           onkeydown="if(event.key==='Enter') checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">Увійти</button>
    <div class="auth-error" id="authError">Невірний пароль</div>
  </div>
</div>

<!-- ══ App ══ -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Smart<span>Sockets</span></div>
      <div class="admin-badge">Admin</div>
    </div>
    <div class="header-right">
      <div class="broker-status" id="brokerStatus">
        <div class="broker-dot"></div>
        <span id="brokerLabel">Відключено</span>
      </div>
    </div>
  </header>

  <div class="settings-bar">
    <span class="settings-label">Брокер</span>
    <input class="s-input wide" id="cfgHost" type="text" placeholder="host.hivemq.cloud">
    <input class="s-input" id="cfgPort" type="number" placeholder="8884" style="width:80px">
    <input class="s-input" id="cfgUser" type="text" placeholder="user">
    <input class="s-input" id="cfgPass" type="password" placeholder="password">
    <button class="btn-connect" onclick="mqttConnect()">Підключити</button>
  </div>

  <main>
    <div class="toolbar">
      <span class="section-title">Мої розетки</span>
      <button class="btn-add" onclick="openModal()">+ Додати розетку</button>
    </div>
    <div class="sockets-grid" id="socketsGrid"></div>
  </main>
</div>

<!-- ══ Modal ══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>➕ Нова розетка</h2>
    <p class="sub">Вкажіть назву та Device ID пристрою</p>
    <div class="form-group">
      <label>Назва розетки</label>
      <input type="text" id="newName" placeholder="Наприклад: Торшер у спальні" maxlength="32">
    </div>
    <div class="form-group">
      <label>Device ID</label>
      <input type="text" id="newDeviceId" placeholder="Наприклад: socket_01" maxlength="24">
      <div class="form-hint">Має збігатись з Device ID у прошивці ESP32</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
      <button class="btn-confirm" onclick="addSocket()">Додати</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  Константи
// ══════════════════════════════════════════════════
const ADMIN_PASSWORD      = 'Qwerty1306';
const TOPIC_CONFIG        = 'home/config/sockets';
const STORAGE_KEY_BROKER  = 'smart_broker_v1';

// ══════════════════════════════════════════════════
//  Авторизація
// ══════════════════════════════════════════════════
function checkAuth() {
  const val = document.getElementById('authInput').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadBrokerConfig();
    renderSockets();
    // Автопідключення якщо є збережений брокер
    const raw = localStorage.getItem(STORAGE_KEY_BROKER);
    if (raw) { try { if (JSON.parse(raw).host) setTimeout(mqttConnect, 400); } catch {} }
  } else {
    const err = document.getElementById('authError');
    err.style.display = 'block';
    document.getElementById('authInput').value = '';
    setTimeout(() => { err.style.display = 'none'; }, 2500);
  }
}

// Перевірка пароля через URL ?admin=XXX
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === ADMIN_PASSWORD) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadBrokerConfig();
    renderSockets();
    const raw = localStorage.getItem(STORAGE_KEY_BROKER);
    if (raw) { try { if (JSON.parse(raw).host) setTimeout(mqttConnect, 400); } catch {} }
  }
});

// ══════════════════════════════════════════════════
//  Стан
// ══════════════════════════════════════════════════
let mqttClient = null;
let sockets    = [];   // [{id, name, relay, online}]

// ══════════════════════════════════════════════════
//  LocalStorage — брокер
// ══════════════════════════════════════════════════
function loadBrokerConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY_BROKER) || '{}');
    document.getElementById('cfgHost').value = cfg.host || '';
    document.getElementById('cfgPort').value = cfg.port || '8884';
    document.getElementById('cfgUser').value = cfg.user || '';
    document.getElementById('cfgPass').value = cfg.pass || '';
  } catch {}
}

function saveBrokerConfig() {
  localStorage.setItem(STORAGE_KEY_BROKER, JSON.stringify({
    host: document.getElementById('cfgHost').value.trim(),
    port: document.getElementById('cfgPort').value.trim(),
    user: document.getElementById('cfgUser').value.trim(),
    pass: document.getElementById('cfgPass').value.trim()
  }));
}

// ══════════════════════════════════════════════════
//  Публікація конфігу розеток у MQTT (retained)
// ══════════════════════════════════════════════════
function publishConfig() {
  if (!mqttClient || !mqttClient.connected) return;
  // Публікуємо тільки id та name — стан relay/online не потрібен у конфігу
  const cfg = sockets.map(s => ({ id: s.id, name: s.name }));
  mqttClient.publish(TOPIC_CONFIG, JSON.stringify(cfg), { qos: 1, retain: true });
  console.log('[MQTT] Config published:', cfg);
}

// ══════════════════════════════════════════════════
//  MQTT
// ══════════════════════════════════════════════════
function mqttConnect() {
  const host = document.getElementById('cfgHost').value.trim();
  const port = parseInt(document.getElementById('cfgPort').value) || 8884;
  const user = document.getElementById('cfgUser').value.trim();
  const pass = document.getElementById('cfgPass').value.trim();
  if (!host) { alert('Вкажіть адресу брокера'); return; }

  saveBrokerConfig();
  setBrokerStatus('', 'Підключення...');
  if (mqttClient) { try { mqttClient.end(true); } catch {} }

  const clientId = 'admin_' + Math.random().toString(36).slice(2, 8);
  mqttClient = mqtt.connect(`wss://${host}:${port}/mqtt`, {
    clientId,
    username: user || undefined,
    password: pass || undefined,
    clean: true,
    reconnectPeriod: 5000
  });

  mqttClient.on('connect', () => {
    setBrokerStatus('connected', host);
    // Отримуємо актуальний список розеток з retained topic
    mqttClient.subscribe(TOPIC_CONFIG, { qos: 1 });
    // Підписуємось на стан та статус вже відомих розеток
    sockets.forEach(s => subscribeSocket(s.id));
  });

  mqttClient.on('error', () => setBrokerStatus('error', 'Помилка'));
  mqttClient.on('offline', () => {
    setBrokerStatus('', 'Офлайн');
    sockets.forEach(s => { s.online = false; });
    renderSockets();
  });

  mqttClient.on('message', (topic, message) => {
    handleMessage(topic, message.toString().trim());
  });
}

function subscribeSocket(id) {
  if (!mqttClient?.connected) return;
  mqttClient.subscribe(`home/${id}/state`,  { qos: 1 });
  mqttClient.subscribe(`home/${id}/status`, { qos: 1 });
}

function unsubscribeSocket(id) {
  if (!mqttClient?.connected) return;
  mqttClient.unsubscribe(`home/${id}/state`);
  mqttClient.unsubscribe(`home/${id}/status`);
}

function handleMessage(topic, payload) {
	// Оновлення списку розеток від адміна (або власне збережений конфіг)
  if (topic === TOPIC_CONFIG) {
    try {
      const list = JSON.parse(payload);
      const prev = {};
      sockets.forEach(s => { prev[s.id] = { relay: s.relay, online: s.online }; });
      sockets = list.map(item => ({
        id: item.id, name: item.name,
        relay:  prev[item.id]?.relay  ?? false,
        online: prev[item.id]?.online ?? false
      }));
      sockets.forEach(s => subscribeSocket(s.id));
      renderSockets();
    } catch(e) { console.error(e); }
    return;
  }
  const parts = topic.split('/');
  if (parts.length < 3) return;
  const id   = parts[1];
  const type = parts[2];
  const s = sockets.find(x => x.id === id);
  if (!s) return;
if (type === 'state') {
    s.relay = payload === 'ON';
    updateCard(s);
    return;
  }
  if (type === 'status') {
    s.online = payload === 'online';
    updateCard(s);
    return;
  }
}

function sendCommand(id, cmd) {
  if (!mqttClient?.connected) { alert('MQTT не підключено'); return; }
  mqttClient.publish(`home/${id}/command`, cmd, { qos: 1 });
}

function setBrokerStatus(cls, text) {
  const el = document.getElementById('brokerStatus');
  el.className = 'broker-status' + (cls ? ' ' + cls : '');
  document.getElementById('brokerLabel').textContent = text;
}

function updateCard(s) {
  const card = document.querySelector(`[data-id="${s.id}"]`);
  if (!card) return;
  card.classList.toggle('on', s.relay);
  card.querySelector('.relay-state').className = 'relay-state' + (s.relay ? ' on' : '');
  card.querySelector('.relay-state').textContent = s.relay ? 'ON' : 'OFF';
  card.querySelector('.toggle-btn').className =
    'toggle-btn' + (s.relay ? ' on' : '') + (!s.online ? ' disabled' : '');
  card.querySelector('.status-dot').className = 'status-dot ' + (s.online ? 'online' : 'offline');
  card.querySelector('.status-label').className = 'status-label ' + (s.online ? 'online' : 'offline');
  card.querySelector('.status-label').textContent = s.online ? 'online' : 'offline';
}

// ══════════════════════════════════════════════════
//  Рендер
// ══════════════════════════════════════════════════
function renderSockets() {
  const grid = document.getElementById('socketsGrid');
  if (!sockets.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔌</div>
      <div class="empty-title">Розеток ще немає</div>
      <div class="empty-sub">Натисніть «Додати розетку» щоб почати</div>
    </div>`;
    return;
  }
  grid.innerHTML = sockets.map((s, i) => `
    <div class="socket-card ${s.relay ? 'on' : ''}" data-id="${s.id}">
      <div class="card-header">
        <div class="card-name-wrap">
          <div class="device-status">
            <div class="status-dot ${s.online ? 'online' : 'offline'}"></div>
            <span class="status-label ${s.online ? 'online' : 'offline'}">${s.online ? 'online' : 'offline'}</span>
          </div>
          <div class="card-name" onclick="startRename(${i})" id="name-${s.id}">
            <span>${esc(s.name)}</span><span class="edit-icon">✏️</span>
          </div>
          <div class="card-topic">home/${esc(s.id)}/command</div>
        </div>
        <button class="btn-delete" onclick="deleteSocket(${i})" title="Видалити">✕</button>
      </div>
      <div class="toggle-wrap">
        <div class="relay-state ${s.relay ? 'on' : ''}">${s.relay ? 'ON' : 'OFF'}</div>
        <button class="toggle-btn ${s.relay ? 'on' : ''} ${!s.online ? 'disabled' : ''}"
          onclick="toggleSocket(${i})"></button>
      </div>
    </div>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
//  Дії
// ══════════════════════════════════════════════════
function toggleSocket(i) {
  const s = sockets[i];
  if (!s?.online) return;
  sendCommand(s.id, s.relay ? 'OFF' : 'ON');
  s.relay = !s.relay;
  renderSockets();
}

function deleteSocket(i) {
  const s = sockets[i];
  if (!confirm(`Видалити розетку «${s.name}»?`)) return;
  unsubscribeSocket(s.id);
  sockets.splice(i, 1);
  publishConfig();
  renderSockets();
}

function startRename(i) {
  const s  = sockets[i];
  const el = document.getElementById(`name-${s.id}`);
  if (!el) return;
  el.innerHTML = `<input type="text" value="${esc(s.name)}" maxlength="32"
    onblur="finishRename(${i},this.value)"
    onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape')this.blur();">`;
  el.querySelector('input').focus();
  el.querySelector('input').select();
}

function finishRename(i, val) {
  const name = val.trim();
  if (name) sockets[i].name = name;
  publishConfig();
  renderSockets();
}

// ══════════════════════════════════════════════════
//  Modal
// ══════════════════════════════════════════════════
function openModal() {
  document.getElementById('newName').value = '';
  document.getElementById('newDeviceId').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 200);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function addSocket() {
  const name = document.getElementById('newName').value.trim();
  const id   = document.getElementById('newDeviceId').value.trim();
  if (!name) { alert('Введіть назву'); return; }
  if (!id)   { alert('Введіть Device ID'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(id)) { alert('Device ID: лише латиниця, цифри, _'); return; }
  if (sockets.find(s => s.id === id)) { alert('Такий Device ID вже є'); return; }

  sockets.push({ id, name, relay: false, online: false });
  subscribeSocket(id);
  publishConfig();
  renderSockets();
  closeModal();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>

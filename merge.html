<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSockets</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell is-visible">
    <header class="site-header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">⚡</div>
        <div class="logo-text">Smart<span>Sockets</span></div>
      </div>
      <div class="conn-status" id="connStatus">
        <div class="conn-dot"></div>
        <span id="connLabel">Підключення...</span>
      </div>
    </header>

    <main class="page-main">
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Завантаження розеток...</p>
      </div>
      <div class="sockets-grid" id="socketsGrid" hidden></div>
    </main>

    <footer class="site-footer">
      <span>© <span id="copyrightYear"></span> CHIEF. Всі права захищені.</span>
    </footer>
  </div>

  <script src="assets/js/shared.js"></script>
  <script src="assets/js/client.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSockets - Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-icon" aria-hidden="true">🔐</div>
      <h1>Admin Panel</h1>
      <p>Введіть пароль для доступу до панелі керування</p>
      <input class="auth-input" type="password" id="authInput" placeholder="••••••••••"
             onkeydown="if(event.key==='Enter') checkAuth()">
      <button class="auth-btn" onclick="checkAuth()">Увійти</button>
      <div class="auth-error" id="authError">Невірний пароль</div>
    </div>
  </div>

  <div id="app" class="app-shell">
    <header class="site-header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">⚡</div>
        <div class="logo-text">Smart<span>Sockets</span></div>
        <div class="admin-badge">Admin</div>
      </div>
      <div class="header-right">
        <div class="broker-status" id="brokerStatus">
          <div class="broker-dot"></div>
          <span id="brokerLabel">Відключено</span>
        </div>
      </div>
    </header>

    <div class="settings-bar">
      <span class="settings-label">Брокер</span>
      <input class="s-input wide" id="cfgHost" type="text" placeholder="host.hivemq.cloud">
      <input class="s-input" id="cfgPort" type="number" placeholder="8884">
      <input class="s-input" id="cfgUser" type="text" placeholder="user">
      <input class="s-input" id="cfgPass" type="password" placeholder="password">
      <button class="btn-connect" onclick="mqttConnect()">Підключити</button>
    </div>

    <main class="page-main">
      <div class="toolbar">
        <span class="section-title">Мої розетки</span>
        <button class="btn-add" onclick="openModal()">+ Додати розетку</button>
      </div>
      <div class="sockets-grid" id="socketsGrid"></div>
    </main>

    <footer class="site-footer">
      <span>© <span id="copyrightYear"></span> CHIEF. Всі права захищені.</span>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Нова розетка</h2>
      <p class="sub">Вкажіть назву та Device ID пристрою</p>
      <div class="form-group">
        <label for="newName">Назва розетки</label>
        <input type="text" id="newName" placeholder="Наприклад: Назва передового поста" maxlength="32">
      </div>
      <div class="form-group">
        <label for="newDeviceId">Device ID</label>
        <input type="text" id="newDeviceId" placeholder="Наприклад: socket_01" maxlength="24">
        <div class="form-hint">Має збігатися з Device ID у прошивці ESP32</div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
        <button class="btn-confirm" onclick="addSocket()">Додати</button>
      </div>
    </div>
  </div>

  <script src="assets/js/shared.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
